<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="stylesheet" href="styles.css">
    <title>Unity WebGL Player | Balled</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" width=960 height=600 style="width: 960px; height: 600px; background: #231F20"></canvas>
    <script src="Build/v1.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/v1.data.unityweb",
        frameworkUrl: "Build/v1.framework.js.unityweb",
        codeUrl: "Build/v1.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "BraidNamage",
        productName: "Balled",
        productVersion: "1.0",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
</html>
