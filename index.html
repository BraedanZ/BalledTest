<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="stylesheet" href="styles.css">
    <title>Unity WebGL Player | Balled</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" width=1920 height=1080></canvas>
    <script src="Build/BalledTest.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/BalledTest.data.unityweb",
        frameworkUrl: "Build/BalledTest.framework.js.unityweb",
        codeUrl: "Build/BalledTest.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "BraidNamage",
        productName: "Balled",
        productVersion: "1.0",
        matchWebGLToCanvasSize: true, 
        devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
</html>
